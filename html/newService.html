<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Registro</title>
    <link rel="stylesheet" href="../css/newService.css">
</head>
<body>

    <h1>NOVO REGISTRO</h1>

    <section class="registro">

        <form>

            <h2>Dados do Cliente</h2>

            <label for="nome">Nome do cliente:</label>
            <input type="text" id="nome" name="nome" required>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required>

            <label for="senhaEmail">Senha do E-mail:</label>
            <input type="text" id="senhaEmail" name="senhaEmail">

            <label for="appAcessoExterno">App de acesso externo:</label>
            <input type="text" id="appAcessoExterno" name="appAcessoExterno">

            <label for="senhaDVR">Senha do DVR:</label>
            <input type="text" id="senhaDVR" name="senhaDVR">

            <label for="dataInstalacao">Data da instalação:</label>
            <input type="date" id="dataInstalacao" name="dataInstalacao">

            <h2>Endereço</h2>

            <label for="rua">Rua:</label>
            <input type="text" id="rua" name="rua">

            <label for="numeroCasa">Número:</label>
            <input type="number" id="numeroCasa" name="numeroCasa">

            <label for="bairro">Bairro:</label>
            <input type="text" id="bairro" name="bairro">

            <label for="cidade">Cidade:</label>
            <input type="text" id="cidade" name="cidade">

            <button type="submit">Salvar Registro</button>

        </form>

    </section>

</body>
</html>
